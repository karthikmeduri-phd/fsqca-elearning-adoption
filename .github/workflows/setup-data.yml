name: Download and commit dataset files

on:
  workflow_dispatch:

jobs:
  download-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download IS-Impact dataset
        run: |
          curl -L -o data/IS-Impact-Clean-DataSet-08292023.xlsx \
            'https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/143698102/bc520fff-cd4e-40b0-bf5e-f07b0f3f3193/IS-Impact-Clean-DataSet-08292023.xlsx'

      - name: Download fsQCA notebook
        run: |
          curl -L -o notebooks/fsQCA_ELearning_Adoption_Replication.ipynb \
            'https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/143698102/1b008450-bd3e-47ae-a44b-38ff928ac672/fsQCA_ELearning_Adoption_Replication.ipynb'

      - name: Commit and push files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/IS-Impact-Clean-DataSet-08292023.xlsx
          git add notebooks/fsQCA_ELearning_Adoption_Replication.ipynb
          git commit -m 'Add IS-Impact dataset and fsQCA replication notebook' || echo 'Nothing to commit'
          git push
